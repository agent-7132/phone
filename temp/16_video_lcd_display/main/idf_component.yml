# ============================================================
# ESP-IDF 组件依赖配置文件
# ============================================================
# 本文件定义了项目所需的组件依赖及其版本约束。
# ESP-IDF构建系统会根据此文件自动下载和管理依赖组件。

# 依赖列表
dependencies:
  # ESP-IDF SDK版本要求
  # 本项目需要ESP-IDF 5.4或更高版本
  idf: ">=5.4"

  # esp_video组件：视频设备驱动组件
  # 版本要求：>=2.2且<3.0（即2.x系列）
  # public: true 表示此依赖会传递给依赖本组件的其他组件
  esp_video:
    version: ">=2.2,<3.0"
    public: true

  # waveshare/esp32_p4_platform组件：Waveshare ESP32-P4平台BSP组件
  # "*"表示接受任意版本
  waveshare/esp32_p4_platform: "*"