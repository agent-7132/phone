dependencies:
  espressif/esp_wifi_remote:
    matches:
      - if: "idf_version >= 6.0"
        version: ">=1.6,<2.0"
      - if: "idf_version < 6.0"
        version: "0.14.*"

  espressif/esp_hosted:
    matches:
      - if: "idf_version >= 6.0"
        version: ">=2.12,<3.0"
      - if: "idf_version < 6.0"
        version: "1.4.*"

  espressif/esp_codec_dev:
    version: "^1.0.0"

  espressif/esp-dsp:
    version: "^1.3"

  espressif/esp_new_jpeg:
    version: "^1.0"

  espressif/usb_host_msc:
    version: "^1.1.4"

  idf:
    version: ">=6.0"