dependencies:
  espressif/esp_wifi_remote:
    matches:
      - if: "idf_version >= 6.0"
        version: ">=1.6,<2.0"
      - if: "idf_version < 6.0"
        version: "0.14.*"

  espressif/esp_hosted:
    matches:
      - if: "idf_version >= 6.0"
        version: ">=2.12,<3.0"
      - if: "idf_version < 6.0"
        version: "1.4.*"

  espressif/esp_codec_dev:
    version: "^1.0.0"

  idf:
    version: ">=4.1.0"